name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Test
        run: |
          python -m compileall -q app scripts tests
          python -m unittest discover -s tests
          bash -n install.sh manage.sh uninstall.sh scripts/distribution_lib.sh ops/slowlink_watchdog.sh
          dash -n install.sh manage.sh uninstall.sh scripts/distribution_lib.sh ops/slowlink_watchdog.sh

      - name: Package and verify
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          file_version="${version//./_}"
          test "$(cat VERSION)" = "$version"
          python scripts/build_release.py --version "$version" --output dist
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 4
          test -f "dist/slowlink_app_v${file_version}.zip"
          test -f "dist/slowlink_v${file_version}_full.zip"
          test -f "dist/slowlink_v${file_version}_update_log.txt"
          test -f dist/SHA256SUMS.txt
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          file_version="${version//./_}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/slowlink_app_v${file_version}.zip" \
            "dist/slowlink_v${file_version}_full.zip" \
            "dist/slowlink_v${file_version}_update_log.txt" \
            dist/SHA256SUMS.txt \
            --verify-tag \
            --title "SlowLink $GITHUB_REF_NAME" \
            --generate-notes
