services:
  redis:
    image: redis:7-alpine
    container_name: slowlink_redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: slowlink_app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "8080:8080" 
    volumes:
      - ./data/sessions:/app/sessions
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - SESSION_PATH=/app/sessions/slowlink

volumes:
  redis_data:
