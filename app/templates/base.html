<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>慢链 SlowLink{% if app_version %} {{ app_version }}{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ app_version|default('dev') }}">
</head>
<body>
<header class="header">
  <div>
    <div class="brand">慢链 SlowLink{% if app_version %} <span class="version">{{ app_version }}</span>{% endif %}</div>
    <div class="sub">Telegram 消息链接聚合系统</div>
  </div>
  <div class="header-actions"><button type="button" class="theme-btn" onclick="toggleTheme()">深色/浅色</button>{% if session.get('logged_in') %}<a class="logout" href="/logout">退出后台</a>{% endif %}</div>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
<script>
(function(){
  const saved = localStorage.getItem('slowlink_theme');
  if (saved === 'dark') document.body.classList.add('dark');
})();
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('slowlink_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
</script>
</body>
</html>
