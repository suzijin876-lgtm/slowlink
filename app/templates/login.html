{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>登录后台</h2>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post">
    <input name="password" type="password" placeholder="后台密码" required>
    <button type="submit">登录</button>
  </form>
</div>
{% endblock %}
